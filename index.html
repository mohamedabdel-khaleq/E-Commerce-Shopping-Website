<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My E-Commerce Store</title>
  <link rel="stylesheet" href="./assets/css/global.css">
</head>
<body>
  <!-- Header with logo, navigation, and theme toggle -->
  <header>
    <h1>🛍️ My Store</h1>
    <nav>
      <a href="./index.html" id="home-link">Home</a>
      <a href="./auth/login.html" id="login-link">Login</a>
      <a href="./auth/signup.html" id="signup-link">Signup</a>
      <a href="./products/products.html">Products</a>
      <a href="./cart/cart.html">Cart</a>
      <a href="./orders/orders.html" id="orders-link" style="display: none;">Orders</a>
      <a href="./admin/admin.html" id="admin-link" style="display: none;">Admin</a>
      <span id="welcome-msg" style="display: none; margin-left: 10px;"></span>
      <button id="logout-btn" style="display: none;">Logout</button>
    </nav>
    <!-- Theme toggle button -->
    <button id="themeToggle">🌙</button>
  </header>

  <!-- Main content -->
  <main>
    <section class="hero">
      <h2>Welcome to My Store</h2>
      <p>Find the best products with great deals</p>
      <a href="./products/products.html" class="btn">Browse All Products</a>
    </section>

    <section class="top-products">
      <h2>Top Products</h2>
      <div id="topProducts" class="grid"></div>
    </section>
  </main>

  <!-- Footer -->
  <footer>
    <div class="footer-container">
      <p>&copy; 2025 My Store. All rights reserved.</p>
      <nav class="footer-nav">
        <a href="#">Privacy Policy</a>
        <a href="#">Terms of Service</a>
        <a href="#">Contact Us</a>
      </nav>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="./assets/js/utils.js"></script>
  <script src="./assets/js/theme.js"></script>
  <script src="./assets/js/top-products.js"></script>
</body>
</html>
